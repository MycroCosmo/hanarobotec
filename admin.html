<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>관리자 - 공지</title>

<style>
body {
  font-family: "Pretendard";
  margin: 0;
  background: #f4f6f8;
}

/* NAV */
.navbar {
  background:#fff;
  border-bottom:1px solid #eee;
}
.nav-inner {
  max-width:1100px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  padding:16px;
}

/* 로그인 */
.auth-wrap {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#f4f6f8,#e9edf2);
}
.auth-card {
  width:100%;
  max-width:380px;
  background:#fff;
  padding:36px;
  border-radius:16px;
}
.auth-title {
  font-size:20px;
  font-weight:700;
  margin-bottom:24px;
  text-align:center;
}
.auth-input {
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:8px;
  margin-bottom:12px;
}
.auth-btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#d97706;
  color:#fff;
  cursor:pointer;
}
.auth-back {
  margin-top:10px;
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:8px;
  background:#fff;
  cursor:pointer;
}
.auth-error {
  font-size:13px;
  color:#d32f2f;
  margin-bottom:10px;
  display:none;
}

/* 관리자 */
.wrap {
  max-width:800px;
  margin:60px auto;
}
.card {
  background:#fff;
  border-radius:12px;
  padding:24px;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
  margin-bottom:10px;
}
textarea {
  min-height:300px;
}

/* 🔥 토글 스위치 */
.toggle-wrap {
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:10px;
  margin:15px 0;
}

.switch {
  position:relative;
  display:inline-block;
  width:46px;
  height:24px;
}

.switch input {
  opacity:0;
  width:0;
  height:0;
}

.slider {
  position:absolute;
  cursor:pointer;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:#ccc;
  transition:.3s;
  border-radius:24px;
}

.slider:before {
  position:absolute;
  content:"";
  height:18px;
  width:18px;
  left:3px;
  bottom:3px;
  background:white;
  transition:.3s;
  border-radius:50%;
}

.switch input:checked + .slider {
  background:#d97706;
}

.switch input:checked + .slider:before {
  transform:translateX(22px);
}

/* 버튼 */
.btn {
  padding:8px 12px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}
.btn-primary { background:#d97706; color:#fff; }
.btn-secondary { background:#eee; }
.btn-danger { background:#444; color:#fff; }

.notice-item {
  border-bottom:1px solid #eee;
  padding:12px 0;
}

.badge-important {
  background:#fff3e0;
  color:#d97706;
  font-size:12px;
  padding:3px 6px;
  border-radius:4px;
  margin-right:6px;
}

.notice-actions {
  display:flex;
  gap:6px;
}
/* 기존 버튼 유지 */
.btn-sm {
  padding:5px 8px;
  font-size:12px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  transition:all 0.2s ease;
}

/* ✏️ 수정 버튼 */
.btn-edit {
  background:#e0f2fe;
  color:#0369a1;
}

.btn-edit:hover {
  background:#bae6fd;
}

/* 🗑 삭제 버튼 */
.btn-delete {
  background:#fee2e2;
  color:#b91c1c;
}

.btn-delete:hover {
  background:#fecaca;
}

.hidden { display:none; }

.nav-inner a {
  text-decoration: none;   /* 밑줄 제거 */
  color: #333;             /* 기본 텍스트 색 */

  padding: 8px 12px;
  border-radius: 6px;
  background: #f1f5f9;

  font-size: 14px;
  transition: all 0.2s ease;
}

/* hover 효과 */
.nav-inner a:hover {
  background: #e2e8f0;
}

/* 클릭 시 */
.nav-inner a:active {
  background: #cbd5f5;
}
</style>
</head>

<body>

<!-- 로그인 -->
<div id="loginBox" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">관리자 로그인</div>

    <div id="errorMsg" class="auth-error">로그인 실패</div>

    <input id="email" class="auth-input" placeholder="이메일" />
    <input id="password" type="password" class="auth-input"
      placeholder="비밀번호"
      onkeydown="if(event.key==='Enter') login();" />

    <button class="auth-btn" onclick="login()">로그인</button>
    <button class="auth-back" onclick="goBack()">돌아가기</button>
  </div>
</div>

<!-- 관리자 -->
<div id="adminArea" class="hidden">
  <nav class="navbar">
    <div class="nav-inner">
      <div>관리자</div>
      <a href="notice.html">공지 보러가기</a>
    </div>
  </nav>

  <div class="wrap">

    <!-- 에디터 -->
    <div class="card">
      <h3 id="editorTitle">공지 작성</h3>

      <input id="title" placeholder="제목" />
      <textarea id="content" placeholder="내용"></textarea>

      <!-- 🔥 토글 -->
      <div class="toggle-wrap">
        <span>중요 공지</span>
        <label class="switch">
          <input type="checkbox" id="important">
          <span class="slider"></span>
        </label>
      </div>

      <button class="btn btn-primary" onclick="saveNotice()">저장</button>
      <button class="btn btn-secondary" onclick="resetForm()">초기화</button>
      <button class="btn btn-danger" onclick="logout()">로그아웃</button>
    </div>

    <!-- 리스트 -->
    <div id="listBox" class="card hidden">
      <h3>공지 목록</h3>
      <div id="list"></div>

      <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
        <button class="btn btn-secondary" onclick="prevPage()">이전</button>
        <button class="btn btn-secondary" onclick="nextPage()">다음</button>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://amseuvowouzqwtdjmjoq.supabase.co",
  "sb_publishable_JbLPO53u1Odu3-1zUj9l7g_FSZTxQmv"
);

let editId = null;
let page = 0;
const pageSize = 10;

window.login = async () => {
  const errorBox = document.getElementById("errorMsg");
  errorBox.style.display = "none";

  const { error } = await supabase.auth.signInWithPassword({
    email: emailEl().value,
    password: pwEl().value,
  });

  if (error) {
    errorBox.style.display = "block";
    return;
  }

  check();
};

window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

async function check() {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    loginBox().classList.add("hidden");
    adminArea().classList.remove("hidden");
    listBox().classList.remove("hidden");
    loadList();
  }
}

window.saveNotice = async () => {
  const title = titleEl().value.trim();
  const content = contentEl().value.trim();
  const important = importantEl().checked;

  if (!title || !content) return alert("입력 필요");

  let error;

  if (editId) {
    ({ error } = await supabase
      .from("notices")
      .update({ title, content, is_important: important })
      .eq("id", editId));
  } else {
    ({ error } = await supabase.from("notices").insert([{
      title,
      content,
      is_important: important,
      is_published: true,
    }]));
  }

  if (error) return alert("실패");

  resetForm();
  loadList();
};

async function loadList() {
  const { data } = await supabase
    .from("notices")
    .select("*")
    .order("created_at", { ascending: false })
    .range(page * pageSize, (page + 1) * pageSize - 1);

  const list = listEl();
  list.innerHTML = "";

  data.forEach(n => {
    const div = document.createElement("div");
    div.className = "notice-item";

    div.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div style="font-weight:600;">
            ${n.is_important ? '<span class="badge-important">중요</span>' : ''} ${n.title}
          </div>
          <div style="font-size:12px;color:#999;">
            ${new Date(n.created_at).toLocaleString()}
          </div>
        </div>
        <div class="notice-actions">
          <button class="btn-sm btn-edit" onclick="editNotice(${n.id})">수정</button>
          <button class="btn-sm btn-delete" onclick="deleteNotice(${n.id})">삭제</button>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

window.deleteNotice = async (id) => {
  if (!confirm("삭제?")) return;
  await supabase.from("notices").delete().eq("id", id);
  loadList();
};

window.editNotice = async (id) => {
  const { data } = await supabase
    .from("notices")
    .select("*")
    .eq("id", id)
    .single();

  editId = id;
  titleEl().value = data.title;
  contentEl().value = data.content;
  importantEl().checked = data.is_important;
};

window.resetForm = () => {
  editId = null;
  titleEl().value = "";
  contentEl().value = "";
  importantEl().checked = false;
};

const emailEl = () => document.getElementById("email");
const pwEl = () => document.getElementById("password");
const titleEl = () => document.getElementById("title");
const contentEl = () => document.getElementById("content");
const importantEl = () => document.getElementById("important");
const listEl = () => document.getElementById("list");
const loginBox = () => document.getElementById("loginBox");
const adminArea = () => document.getElementById("adminArea");
const listBox = () => document.getElementById("listBox");

window.nextPage = () => { page++; loadList(); };
window.prevPage = () => { if(page>0){ page--; loadList(); } };

window.goBack = () => {
  if (document.referrer) history.back();
  else location.href = "index.html";
};

check();
</script>

</body>
</html>
