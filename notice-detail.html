<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>공지 상세</title>
  <style>
    body { font-family:sans-serif; margin:0; background:#f5f5f5; }

    .navbar {
      background:#fff;
      border-bottom:1px solid #eee;
    }
    .nav-inner {
      max-width:1200px;
      margin:0 auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 20px;
    }
    .menu {
      list-style:none;
      display:flex;
      gap:20px;
    }
    .menu a { text-decoration:none; color:#333; }
    .menu a.active { color:#D97706; font-weight:700; }

    .wrap { max-width:800px; margin:0 auto; padding:40px 20px; }
    .box { background:#fff; padding:30px; border-radius:10px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <div class="logo">
      <img src="logo.png" width="150" alt="하나로보텍 로고">
    </div>
    <ul class="menu">
      <li><a href="index.html">홈</a></li>
      <li><a href="notice.html" class="active">공지사항</a></li>
    </ul>
  </div>
</nav>

<div class="wrap">
  <div class="box" id="detail"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://amseuvowouzqwtdjmjoq.supabase.co',
  'sb_publishable_JbLPO53u1Odu3-1zUj9l7g_FSZTxQmv'
);

const id = new URLSearchParams(location.search).get('id');

async function load() {
  const { data } = await supabase
    .from('notices')
    .select('*')
    .eq('id', id)
    .single();

  const el = document.getElementById('detail');

  el.innerHTML = `
    <h2>${data.title}</h2>
    <p>${new Date(data.created_at).toLocaleDateString()}</p>
    <hr/>
    <div>${data.content.replace(/\n/g,'<br/>')}</div>
    <br/>
    <a href="notice.html">목록으로</a>
  `;
}

load();
</script>

</body>
</html>
